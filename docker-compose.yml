version: '3.8'

services:
  buzz:
    image: buzzbd/buzz-bd-agent:v7.5.0
    container_name: buzz-production
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "18789:18789"
    volumes:
      - buzz-data:/data
    environment:
      # ‚îÄ‚îÄ‚îÄ LLM API Keys ‚îÄ‚îÄ‚îÄ
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - BANKR_API_KEY=${BANKR_API_KEY}
      - BANKR_LLM_KEY=${BANKR_LLM_KEY}
      - BANKR_PARTNER_KEY=${BANKR_PARTNER_KEY}
      - BANKR_FEE_WALLET=${BANKR_FEE_WALLET}
      - BANKR_DEPLOY_WALLET=${BANKR_DEPLOY_WALLET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # ‚îÄ‚îÄ‚îÄ Intel Source Keys ‚îÄ‚îÄ‚îÄ
      - HELIUS_API_KEY=${HELIUS_API_KEY}
      - GROK_API_KEY=${GROK_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - ALLIUM_API_KEY=${ALLIUM_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - HYPERBROWSER_API_KEY=${HYPERBROWSER_API_KEY}
      - CMC_API_KEY=${CMC_API_KEY}
      - AGENTPROOF_API_KEY=${AGENTPROOF_API_KEY}
      # ‚îÄ‚îÄ‚îÄ Bags.fm ‚îÄ‚îÄ‚îÄ
      - BAGS_API_KEY=REDACTED_BAGS_API_KEY
      - BAGS_AGENT_TOKEN=REDACTED_BAGS_AGENT_TOKEN
      - BAGS_AGENT_WALLET=REDACTED_BAGS_AGENT_WALLET
      # ‚îÄ‚îÄ‚îÄ Twitter/X API ‚îÄ‚îÄ‚îÄ
      - X_API_KEY=${X_API_KEY}
      - X_API_SECRET=${X_API_SECRET}
      - X_BEARER_TOKEN=${X_BEARER_TOKEN}
      - X_ACCESS_TOKEN=${X_ACCESS_TOKEN}
      - X_ACCESS_TOKEN_SECRET=${X_ACCESS_TOKEN_SECRET}
      - X_BOT_USER_ID=${X_BOT_USER_ID}
      - MAX_REPLIES_DAY=${MAX_REPLIES_DAY:-30}
      # ‚îÄ‚îÄ‚îÄ Telegram ‚îÄ‚îÄ‚îÄ
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - WAR_ROOM_CHAT_ID=-1003701758077
      # ‚îÄ‚îÄ‚îÄ ACP / Identity ‚îÄ‚îÄ‚îÄ
      - ACP_API_KEY=${ACP_API_KEY}
      - ACP_AGENT_ID=${ACP_AGENT_ID:-17681}
      - ACP_WALLET_ADDRESS=${ACP_WALLET_ADDRESS}
      # ‚îÄ‚îÄ‚îÄ Moltbook / Molten ‚îÄ‚îÄ‚îÄ
      - MOLTBOOK_API_KEY=${MOLTBOOK_API_KEY}
      - MOLTBOOK_AGENT_ID=${MOLTBOOK_AGENT_ID}
      - MOLTEN_API_KEY=${MOLTEN_API_KEY}
      # ‚îÄ‚îÄ‚îÄ Gmail OAuth ‚îÄ‚îÄ‚îÄ
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
      - GMAIL_ADDRESS=${GMAIL_ADDRESS}
      # ‚îÄ‚îÄ‚îÄ ATV / Web3 Identity ‚îÄ‚îÄ‚îÄ
      - ATV_API_URL=https://api.web3identity.com
      - ATV_BATCH_ENDPOINT=/api/ens/batch-resolve
      # ‚îÄ‚îÄ‚îÄ Nansen ‚îÄ‚îÄ‚îÄ
      - NANSEN_API_KEY=${NANSEN_API_KEY}
      - NANSEN_X402_ENABLED=${NANSEN_X402_ENABLED}
      - NANSEN_X402_WALLET_KEY=${NANSEN_X402_WALLET_KEY}
      # ‚îÄ‚îÄ‚îÄ BNB Chain ‚îÄ‚îÄ‚îÄ
      - BNB_PRIVATE_KEY=${BNB_PRIVATE_KEY}
      # ‚îÄ‚îÄ‚îÄ Supermemory ‚îÄ‚îÄ‚îÄ
      - SUPERMEMORY_OPENCLAW_API_KEY=${SUPERMEMORY_OPENCLAW_API_KEY}
      # ‚îÄ‚îÄ‚îÄ API ‚îÄ‚îÄ‚îÄ
      - BUZZ_API_ADMIN_KEY=${BUZZ_API_ADMIN_KEY}
      - BUZZ_API_PORT=3000
      - NODE_ENV=production

volumes:
  buzz-data:
    driver: local
