name: Weekly BD Report

on:
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy script to server and execute
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.137.253
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 3m
          script: |
            cd /root/buzz-bd-agent 2>/dev/null || cd /data/buzz 2>/dev/null || true
            git fetch origin main --depth=1 2>/dev/null || true
            git checkout origin/main -- scripts/send-weekly-bd-report-w16.sh 2>/dev/null || true
            if [[ -f scripts/send-weekly-bd-report-w16.sh ]]; then
              bash scripts/send-weekly-bd-report-w16.sh
            else
              echo "Script not found on server. Pulling from repo..."
              cd /tmp
              git clone --depth=1 https://github.com/buzzbysolcex/buzz-bd-agent.git bd-report-tmp 2>/dev/null
              bash bd-report-tmp/scripts/send-weekly-bd-report-w16.sh
              rm -rf bd-report-tmp
            fi
