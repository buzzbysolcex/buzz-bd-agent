name: Weekly BD Report

on:
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Gather live pipeline data from server
        id: data
        uses: appleboy/ssh-action@v1
        with:
          host: 204.168.137.253
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 2m
          capture_stdout: true
          script: |
            echo "===STATS_START==="
            docker exec buzz-production curl -s http://127.0.0.1:3000/api/v1/pipeline/stats 2>/dev/null || echo '{}'
            echo "===STATS_END==="
            echo "===PROSPECTS_START==="
            docker exec buzz-production curl -s "http://127.0.0.1:3000/api/v1/pipeline/stage/prospect" 2>/dev/null || echo '{}'
            echo "===PROSPECTS_END==="
            echo "===SIMS_START==="
            docker exec buzz-production curl -s http://127.0.0.1:3000/api/v1/simulate-listing/results 2>/dev/null || echo '{}'
            echo "===SIMS_END==="
            echo "===ION_START==="
            docker exec buzz-production curl -s "http://127.0.0.1:3000/api/v1/pipeline?chain=bsc&min_score=80&limit=20" 2>/dev/null || echo '{}'
            echo "===ION_END==="

      - name: Build and send report via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RAW_DATA: ${{ steps.data.outputs.stdout }}
        run: |
          CHAT_ID="950395553"
          DATE=$(date -u +%Y-%m-%d)

          # Parse live data
          STATS=$(echo "$RAW_DATA" | sed -n '/===STATS_START===/,/===STATS_END===/p' | grep -v '===' | head -1)
          PROSPECTS_RAW=$(echo "$RAW_DATA" | sed -n '/===PROSPECTS_START===/,/===PROSPECTS_END===/p' | grep -v '===' | head -1)
          ION_RAW=$(echo "$RAW_DATA" | sed -n '/===ION_START===/,/===ION_END===/p' | grep -v '===' | head -1)

          # Extract stats
          TOTAL=$(echo "$STATS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total','1044+'))" 2>/dev/null || echo "1044+")
          ADDED=$(echo "$STATS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('added_24h',0))" 2>/dev/null || echo "0")

          parse_stage() {
            echo "$STATS" | python3 -c "
          import sys,json
          d=json.load(sys.stdin).get('by_stage',{})
          s=d.get('$1',{})
          c=s.get('count',0)
          a=s.get('avg_score')
          avg=f' (avg {round(a)})' if a else ''
          print(f'{c}{avg}')" 2>/dev/null || echo "?"
          }

          S_DISC=$(parse_stage discovered)
          S_SCAN=$(parse_stage scanned)
          S_SCORED=$(parse_stage scored)
          S_PROSP=$(parse_stage prospect)
          S_CONT=$(parse_stage contacted)
          S_NEG=$(parse_stage negotiating)
          S_APP=$(parse_stage approved)
          S_LIST=$(parse_stage listed)
          S_REJ=$(parse_stage rejected)

          # Parse top prospects
          TOP5=$(echo "$PROSPECTS_RAW" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          tokens=d.get('tokens',d.get('data',[]))[:5]
          for i,t in enumerate(tokens,1):
              sym=t.get('ticker',t.get('symbol','?'))
              ch=t.get('chain','?')
              sc=t.get('score','?')
              upd=str(t.get('updated_at','?'))[:10]
              print(f'{i}. {sym} ({ch}) -- {sc}/100 -- upd:{upd}')
          if not tokens: print('No prospect-stage tokens found')
          " 2>/dev/null || echo "Could not parse prospects")

          # Parse ION BSC
          ION_STATUS=$(echo "$ION_RAW" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          tokens=d.get('tokens',d.get('data',[]))
          ions=[t for t in tokens if 'ION' in (t.get('ticker','')or t.get('symbol','')).upper()]
          if ions:
              t=ions[0]
              print(f\"Score: {t.get('score','?')}/100 | Stage: {t.get('stage','?')} | Updated: {str(t.get('updated_at','?'))[:10]}\")
          else:
              print('Score: 83 (last known) | Stage: prospect | Updated: unknown')
          " 2>/dev/null || echo "Score: 83 (last known) | Stage: prospect")

          # Build messages
          MSG1=$(cat <<EOFMSG
          BUZZ WEEKLY BD REPORT
          Week of ${DATE} | Week 16
          buzzbd.ai
          ===================================

          PIPELINE FUNNEL (${TOTAL} tokens scored)
          Added 24h: ${ADDED}

            discovered: ${S_DISC}
            scanned: ${S_SCAN}
            scored: ${S_SCORED}
            prospect: ${S_PROSP}
            contacted: ${S_CONT}
            negotiating: ${S_NEG}
            approved: ${S_APP}
            listed: ${S_LIST}
            rejected: ${S_REJ}

          TOP 5 HOT TOKENS (Prospect Stage)
          ${TOP5}

          *Pre-calibration scores. Calibration audit 11 WEEKS OVERDUE.

          SIMULATION VERDICTS
            Nasdog (MiroFish 10K, 4 waves): BULLISH
            W1: 0.620 > W2: 0.665 > W3: 0.696 > W4: 0.765
            All 5 clusters bullish. Institutional: 0.664.
            ZERO simulations on any of the top 5 prospects.
          EOFMSG
          )

          MSG2=$(cat <<EOFMSG
          PIPELINE VELOCITY: ZERO (7th consecutive week)

          No stage movements, no outreach, no simulations,
          no score tweets. Zero git commits since June 1.
          7 consecutive weeks of zero pipeline movement.

          STALLED TOKENS (all 65+ days at prospect, no action):
          BALLWARS (SOL) / Max (SOL) / TRUMP (SOL) / VELO (BSC)
          BANANAS31 (BSC) -- 77d no reply, DEAD
          \$COW (BSC) -- 77d no reply, DEAD

          ION BSC STATUS (Primary Prospect)
          ${ION_STATUS}
          Contact: @0xDeployer (Bankr partner) -- KNOWN
          Outreach: NOT SENT
          Days waiting: 42+ since first flagged
          Blockers: ZERO

          ION BSC = #1 BD action item for 6 CONSECUTIVE reports
          (Weeks 10-16). 42 days of inaction. Zero blockers.
          EOFMSG
          )

          MSG3=$(cat <<EOFMSG
          WEEK-OVER-WEEK TREND

                            W14    W15    W16
          Tokens scored:  1044+  1044+  ${TOTAL}  FLAT
          Prospects:         5      5    ${S_PROSP%% *}  FLAT
          Contacted:         2      2    ${S_CONT%% *}  FLAT
          Listed:            0      0    ${S_LIST%% *}  FLAT
          Stage moves:       0      0      0  FLAT
          ION outreach:   NONE   NONE   NONE  FLAT
          Dead deal age:   63d    70d    77d  WORSE
          Revenue:        \$192   \$192   \$192  FLAT

          Every metric flat or worsening. Pipeline frozen.
          EOFMSG
          )

          MSG4=$(cat <<'EOFMSG'
          BD ACTION ITEMS (Priority Order)

          1. [CRITICAL -- 6 WKS] ION BSC outreach
             Score 83, @0xDeployer, zero blockers. SEND NOW.

          2. [CRITICAL -- 6 WKS] Close BANANAS31 + $COW
             77d no response. Mark REJECTED.

          3. [HIGH -- 11 WKS] Calibration audit top 5
             Pipeline 95 vs calibrated ~60.

          4. [HIGH] MicroBuzz v2 sim on BALLWARS or Max

          5. [HIGH] Execute 1+ score tweet from pipeline

          REVENUE: ~270K sats (~$192) | Listing: $0
          16 weeks. 1,044+ scored. 0 listed. $0 listing revenue.
          Execute ION BSC outreach TODAY.

          -- Buzz BD Agent | SolCex Exchange | buzzbd.ai
          EOFMSG
          )

          send_msg() {
            local text="$1"
            local result
            result=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg chat "$CHAT_ID" --arg text "$text" '{chat_id: $chat, text: $text, disable_web_page_preview: true}')")
            local ok=$(echo "$result" | jq -r '.ok // "false"')
            local msg_id=$(echo "$result" | jq -r '.result.message_id // "?"')
            if [[ "$ok" == "true" ]]; then
              echo "OK (msg_id: $msg_id)"
            else
              local desc=$(echo "$result" | jq -r '.description // "unknown"')
              echo "FAIL: $desc"
            fi
          }

          echo "Sending Week 16 BD Report to chat $CHAT_ID..."
          echo -n "Part 1/4: "; send_msg "$MSG1"
          sleep 1
          echo -n "Part 2/4: "; send_msg "$MSG2"
          sleep 1
          echo -n "Part 3/4: "; send_msg "$MSG3"
          sleep 1
          echo -n "Part 4/4: "; send_msg "$MSG4"
          echo "Done."
